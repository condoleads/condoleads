name: Nightly Reconcile

# P-LIFECYCLE Event 7 -- bounded incremental nightly reconcile (the safety net
# behind the mutation triggers). Detects cache drift on the sync-delta + flagged
# + rolling-sample candidate set and logs corrections to reconcile_corrections.
#
# Cron timing: 09:00 UTC = 04:00 EST. Nightly-sync starts at 07:00 UTC and has
# a 6h budget per phase (homes + buildings sequential), so a ~2h offset gives
# the sync's homes phase room to complete before reconcile reads its delta.
# Buildings phase may still be running -- reconcile reads mls_listings only,
# and the buildings phase is upserts not deletes, so a buildings-in-flight
# state can be safely sampled (any rows still being upserted will show in the
# NEXT night's delta).
#
# Separate workflow from nightly-sync.yml on purpose (same rationale as
# reroll-worker.yml lines 11-14): coupling to nightly-sync exposes reconcile
# to the F-NIGHTLY-SYNC-TIMEOUT-6H failure mode. Independent failure surface.
#
# Threshold-alert path:
#   - Function inserts tenant_floor_alerts row when corrections > threshold.
#   - Route returns threshold_exceeded: true in JSON.
#   - This workflow exits 1 on threshold_exceeded so GH Actions surfaces a
#     failure notification (email/Slack per current GH Actions setup).

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC = 04:00 EST
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Hours of mls_listings.updated_at delta to scan'
        type: number
        default: 24
      sample_pct:
        description: 'TABLESAMPLE BERNOULLI percentage for rolling sample (0..100)'
        type: number
        default: 0.08
      threshold:
        description: 'Corrections-per-run threshold for the drift alert'
        type: number
        default: 50

env:
  WORKER_BASE:        ${{ secrets.REROLL_WORKER_BASE_URL }}
  CRON_TOKEN:         ${{ secrets.RECONCILE_CRON_TOKEN }}   # SEPARATE from REROLL_WORKER_CRON_TOKEN
  # Tenant ids documented in CLAUDE.md (Verified key IDs); not secret.
  WALLIAM_TENANT_ID:  b16e1039-38ed-43d7-bbc5-dd02bb651bc9
  AILY_TENANT_ID:     e2619717-6401-4159-8d4c-d5f87651c8d6

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Reconcile per tenant
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${WORKER_BASE:-}" ]; then
            echo "FATAL: REROLL_WORKER_BASE_URL secret is unset."
            exit 1
          fi
          if [ -z "${CRON_TOKEN:-}" ]; then
            echo "FATAL: RECONCILE_CRON_TOKEN secret is unset."
            exit 1
          fi

          LOOKBACK="${{ inputs.lookback_hours || 24 }}"
          SAMPLE="${{ inputs.sample_pct || 0.08 }}"
          THRESH="${{ inputs.threshold || 50 }}"
          ANY_EXCEEDED=0

          run_tenant() {
            local TENANT_ID="$1"
            echo ""
            echo "=== reconcile tenant=${TENANT_ID} (lookback=${LOOKBACK}h, sample=${SAMPLE}%, threshold=${THRESH}) ==="

            local RES
            RES=$(curl -sS --fail \
              -X POST \
              -H "Authorization: Bearer ${CRON_TOKEN}" \
              -H "Content-Type: application/json" \
              "${WORKER_BASE}/api/admin-homes/territory/reconcile?tenant_id=${TENANT_ID}&lookback_hours=${LOOKBACK}&sample_pct=${SAMPLE}&threshold=${THRESH}")
            echo "  response: ${RES}"

            local CANDIDATES CORRECTIONS EXCEEDED
            CANDIDATES=$(echo  "$RES" | jq -r '.candidates         // 0')
            CORRECTIONS=$(echo "$RES" | jq -r '.corrections        // 0')
            EXCEEDED=$(echo    "$RES" | jq -r '.threshold_exceeded // false')

            echo "  tenant=${TENANT_ID} candidates=${CANDIDATES} corrections=${CORRECTIONS} threshold_exceeded=${EXCEEDED}"

            if [ "${EXCEEDED}" = "true" ]; then
              echo "  ALERT: tenant=${TENANT_ID} corrections=${CORRECTIONS} EXCEEDS threshold=${THRESH}"
              ANY_EXCEEDED=1
            fi
          }

          run_tenant "${WALLIAM_TENANT_ID}"
          run_tenant "${AILY_TENANT_ID}"

          echo ""
          echo "reconcile complete; any_exceeded=${ANY_EXCEEDED}"

          # Surface to GH Actions notification channel by exiting non-zero.
          # The tenant_floor_alerts row was already inserted by the function;
          # exit 1 is the secondary signal.
          if [ "${ANY_EXCEEDED}" -eq 1 ]; then
            exit 1
          fi
