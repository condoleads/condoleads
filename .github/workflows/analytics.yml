name: Nightly Analytics

on:
  schedule:
    - cron: '0 9 * * *'   # 4 AM EST = 9 AM UTC (runs 2h after nightly sync)
  workflow_dispatch:
    inputs:
      cold_start:
        description: 'Full rebuild — process all geo entities'
        type: boolean
        default: false

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  # Platform ops sender key — same Resend account condoleads.ca is verified in.
  # Used by the report step below. Analytics itself uses no email.
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  # PG-DIRECT-COUNT-FIX 2026-07-21: analytics-report.ts doesn't currently
  # count mls_listings (its report is scoped to geo_analytics tables which
  # fit under Supabase's PostgREST timeout), but plumbing DATABASE_URL here
  # too keeps env parity with the sync workflows in case a future analytics
  # report grows to touch big tables.
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run analytics
        id: analytics
        run: NODE_OPTIONS='--max-old-space-size=6144' npx tsx scripts/analytics-nightly.ts
        env:
          COLD_START: ${{ inputs.cold_start || 'false' }}
      # Ops report — MUST run even when the analytics step fails / times out /
      # is cancelled. Silent analytics failure would degrade estimator + Charlie
      # + geo pages (they read geo_analytics tables).
      - name: Send analytics report
        if: always()
        run: npx tsx scripts/analytics-report.ts
        env:
          REPORT_SYNC_STATUS: ${{ steps.analytics.outcome }}